network:
  version: 2
  renderer: networkd

  ethernets:
    enp0s4:
      dhcp4: no
      addresses:
        - 192.168.20.2/24
      routes:
        - to: default
          via: 192.168.20.1
      nameservers:
        addresses:
          - 8.8.8.8
          - 4.4.4.4

    enp0s5:
      dhcp4: no
      addresses:
        - 192.168.30.1/24
      routes:
        - to: 192.168.40.0/24
          via: 192.168.30.2